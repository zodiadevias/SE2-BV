<div class="auth-dialog">
  <div class="auth-header">
    <div class="auth-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
    <h2>{{ isLogin ? 'Welcome Back' : 'Create Account' }}</h2>
    <p class="auth-subtitle">{{ isLogin ? 'Sign in to continue' : 'Get started with BlockVote' }}</p>
  </div>

  <form [formGroup]="authForm" (ngSubmit)="submit()" class="auth-form">
    <div class="form-group">
      <label>Email Address</label>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="you@example.com" 
        class="input"
        [class.error]="authForm.get('email')?.invalid && authForm.get('email')?.touched"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input 
        type="password" 
        formControlName="password" 
        placeholder="Enter your password" 
        class="input"
        [class.error]="authForm.get('password')?.invalid && authForm.get('password')?.touched"
      />
    </div>

    <ng-container *ngIf="!isLogin">
      <div class="form-group">
        <label>Confirm Password</label>
        <input 
          type="password" 
          formControlName="confirmPassword" 
          placeholder="Confirm your password" 
          class="input"
          [class.error]="authForm.get('confirmPassword')?.invalid && authForm.get('confirmPassword')?.touched"
        />
      </div>

      <div class="form-group">
        <label>Role</label>
        <select formControlName="role" class="input">
          <option value="voter">Voter</option>
          <option value="organizer">Organizer</option>
        </select>
      </div>

      <!-- OTP Step -->
      <div *ngIf="otpSent && !isOtpVerified; else sendOtpBlock" class="otp-section">
        <div class="otp-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <polyline points="3,7 12,13 21,7"></polyline>
          </svg>
          <span>Check your email for the OTP code</span>
        </div>
        <div class="form-group">
          <label>Enter OTP Code</label>
          <input 
            type="text" 
            formControlName="otp" 
            placeholder="123456" 
            class="input otp-input"
            maxlength="6"
            pattern="[0-9]*"
          />
          <button type="button" (click)="verifyOtp()" class="button" style="width: 100%; margin-top: 0.5rem;">
            Verify OTP
          </button>
        </div>
      </div>

      <ng-template #sendOtpBlock>
        <button type="button" (click)="sendOtp()" class="button ghost" style="width: 100%;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <polyline points="3,7 12,13 21,7"></polyline>
          </svg>
          Send Verification Code
        </button>
      </ng-template>
    </ng-container>

    <div *ngIf="errorMessage" class="error-message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Login button only -->
    <button *ngIf="isLogin" type="submit" class="button success" style="width: 100%;">
      Sign In
    </button>
  </form>

  <div class="auth-footer">
    <button (click)="toggleMode()" class="button ghost" style="width: 100%;">
      {{ isLogin ? 'Don\'t have an account? Register' : 'Already have an account? Sign In' }}
    </button>
  </div>
</div>
